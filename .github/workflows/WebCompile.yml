name: WebCompile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  WebCompile:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r ./website/requirements.txt

      - name: Cache Emscripten
        uses: actions/cache@v4
        with:
          path: emsdk-cache
          key: ${{ runner.os }}-emsdk-${{ hashFiles('.emscripten') }}
          restore-keys: |
            ${{ runner.os }}-emsdk-

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Compile WASM
        run: python3 -m website.compile_site

      - name: Cache Jekyll gems
        uses: actions/cache@v4
        with:
          path: website/jekyll_site/vendor/bundle
          key: ${{ runner.os }}-jekyll-${{ hashFiles('website/jekyll_site/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-jekyll-

      - name: Compile Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./website/jekyll_site
          destination: ./website/jekyll_site/_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/jekyll_site/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4