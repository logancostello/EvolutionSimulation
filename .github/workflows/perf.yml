name: Perf

on:
  push:
    branches: [main, 78-add-base-jekyll-site-for-wasm]
  pull_request:
    branches: [main]

jobs:
  perf:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-x11-${{ hashFiles('.github/workflows/perf.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-x11-

      - name: Install X11 and graphics dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev

      - name: Cache Jekyll gems
        uses: actions/cache@v4
        with:
          path: website/jekyll_site/vendor/bundle
          key: ${{ runner.os }}-jekyll-${{ hashFiles('website/jekyll_site/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-jekyll-

      - name: Install Jekyll & dependencies
        run: |
          sudo apt-get install -y ruby-full build-essential zlib1g-dev
          sudo gem install bundler
          cd ./website/jekyll_site
          bundle install --path vendor/bundle

      - name: Run performance benchmarking
        run: python3 -m perf.perf_main

