name: Perf

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  perf:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-x11-${{ hashFiles('.github/workflows/perf.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-x11-

      - name: Install X11 and graphics dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev

      - name: Run performance benchmarking
        run: python3 -m perf.perf_main

      - name: Commit flamegraphs and benchmark data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f website/jekyll_site/perf/flamegraphs/*.svg
          git add -f website/jekyll_site/perf/benchmark.csv
          git add -f website/jekyll_site/perf/benchmark_plot.html

          if git diff --cached --quiet; then
            echo "No perf changes to commit"
          else
            git commit -m "chore: update perf data [skip ci]"
            git push
          fi