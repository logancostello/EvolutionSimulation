name: Perf

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  perf:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-x11-${{ hashFiles('.github/workflows/perf.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-x11-

      - name: Install X11 and graphics dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev

      - name: Run performance benchmarking
        run: python3 -m perf.perf_main

      # TODO: Add updated flamegraph and analytics to webpage